<body>

  <script type="text/babel">

    function App() {
      const [loading, setLoading] = useState(true);
      const [isPlaying, setIsPlaying] = useState(false);
      const audioRef = useRef(null);

      useEffect(() => {
        const timer = setTimeout(() => setLoading(false), 1500);
        return () => clearTimeout(timer);
      }, []);

      const toggleMusic = () => {
        if (isPlaying) {
          audioRef.current.pause();
        } else {
          audioRef.current.play().catch(() => alert("Interact with the page first to enable background traditional music!"));
        }
        setIsPlaying(!isPlaying);
      };

      if (loading) return (
        <div className="fixed inset-0 bg-[#4a0e17] z-50 flex flex-col items-center justify-center text-center">
          <div className="text-[#d4af37] text-7xl animate-spin speed-slow mb-4">ॐ</div>

      );

      return (

    function FlowerCanvas() {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let animationId;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const petals = Array.from({ length: 30 }, () => ({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          r: Math.random() * 5 + 3,
          speedY: Math.random() * 1 + 1,
          speedX: Math.random() * 1 - 0.5,
          color: Math.random() > 0.5 ? '#d4af37' : '#f4c430'
        }));

        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          petals.forEach(p => {
            ctx.beginPath();
            ctx.fillStyle = p.color;
            ctx.globalAlpha = 0.6;
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
            p.y += p.speedY;
            p.x += p.speedX;
            if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
          });
          animationId = requestAnimationFrame(draw);
        }
        draw();
        return () => cancelAnimationFrame(animationId);
      }, []);
      return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-30" />;
    }


function HeroSection() {
      const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

      useEffect(() => {
        const target = new Date(WEDDING_DATA.weddingDate).getTime();
        const interval = setInterval(() => {
          const difference = target - new Date().getTime();
          if (difference < 0) return clearInterval(interval);
          setTimeLeft({
            days: Math.floor(difference / (1000 * 60 * 60 * 24)),
            hours: Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
            minutes: Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60)),
            seconds: Math.floor((difference % (1000 * 60)) / 1000)
          });
        }, 1000);
        return () => clearInterval(interval);
      }, []);

      return (
        <section className="relative min-h-[95vh] bg-gradient-to-b from-[#4a0e17] via-[#2c050a] to-[#4a0e17] text-[#fdfbf7] flex flex-col justify-center items-center px-4 py-16 border-b-8 double border-[#d4af37]">

              {WEDDING_DATA.groom}
              <span className="block mt-0.5 text-xs md:text-sm font-sans tracking-widest text-[#f3e5ab]/80 font-normal normal-case">

              </span>
            </h1>
            
            <p className="text-lg text-[#f3e5ab] italic font-sans my-1">weds</p>
            
            {/* ✅ Updated: Ramaya Name & Designation */}

              {WEDDING_DATA.bride}

                (B.Sc)

            <div className="w-32 h-[1px] bg-[#d4af37] my-4" />

              "{WEDDING_DATA.tagline}"

              {Object.entries(timeLeft).map(([unit, val]) => (
